name: 'Commit BOSH Release Repo'
description: 'Commit and push changes after creating a final BOSH release'

inputs:
  release_dir:
    description: 'Path to the BOSH release repository'
    required: true
  git_user_name:
    description: 'Git user.name for commit'
    required: true
  git_user_email:
    description: 'Git user.email for commit'
    required: true

outputs:
  commit_sha:
    description: 'Commit SHA of the pushed release commit'
    value: ${{ steps.commit.outputs.commit_sha }}

runs:
  using: 'composite'
  steps:
  - name: Commit and push changes
    id: commit
    shell: bash
    run: |
      set -euo pipefail
      
      pushd "${{ inputs.release_dir }}"

        git config user.name "${{ inputs.git_user_name }}"
        git config user.email "${{ inputs.git_user_email }}"

        git add config/blobs.yml
        git add .final_builds/
        git add releases/

        if git diff --staged --quiet; then
          echo "No changes to commit"
          sha=$(git rev-parse HEAD)
        else
          git commit -m "Finalize BOSH release"
        fi

        git fetch origin

        # Stash any unstaged changes before rebasing to avoid "cannot rebase: You have unstaged changes" error
        stash_result=$(git stash push -m "Temporary stash for rebase" 2>&1) || true
        stashed=false
        if [[ "$stash_result" != *"No local changes to save"* ]]; then
          stashed=true
          echo "Stashed unstaged changes before rebase"
        fi

        # Rebase onto latest remote to handle commits pushed while workflow ran
        git rebase origin/${GITHUB_REF_NAME}

        # Restore stashed changes if any
        if [[ "$stashed" == "true" ]]; then
          git stash pop || echo "Warning: Could not restore stashed changes"
        fi

        git push origin HEAD:${GITHUB_REF_NAME}

        sha=$(git rev-parse HEAD)

        echo "commit_sha=$sha" >> "$GITHUB_OUTPUT"

      popd
