name: 'Commit BOSH Release Repo'
description: 'Commit and push changes after creating a final BOSH release'

inputs:
  release_dir:
    description: 'Path to the BOSH release repository'
    required: true
  git_user_name:
    description: 'Git user.name for commit'
    required: true
  git_user_email:
    description: 'Git user.email for commit'
    required: true

outputs:
  commit_sha:
    description: 'Commit SHA of the pushed release commit'
    value: ${{ steps.commit.outputs.commit_sha }}

runs:
  using: 'composite'
  steps:
  - name: Commit and push changes
    id: commit
    shell: bash
    run: |
      set -euo pipefail

      pushd "${{ inputs.release_dir }}"

        git config user.name "${{ inputs.git_user_name }}"
        git config user.email "${{ inputs.git_user_email }}"

        # Fetch the latest remote state
        git fetch origin

        # Save the release artifacts we want to commit
        echo "Saving release artifacts..."
        mkdir -p /tmp/release-artifacts
        cp -r .final_builds /tmp/release-artifacts/ 2>/dev/null || true
        cp -r releases /tmp/release-artifacts/ 2>/dev/null || true
        cp config/blobs.yml /tmp/release-artifacts/ 2>/dev/null || true

        # Reset to the latest remote branch to avoid rebase conflicts
        echo "Resetting to latest origin/${GITHUB_REF_NAME}..."
        git reset --hard origin/${GITHUB_REF_NAME}

        # Restore the release artifacts
        echo "Restoring release artifacts..."
        cp -r /tmp/release-artifacts/.final_builds . 2>/dev/null || true
        cp -r /tmp/release-artifacts/releases . 2>/dev/null || true
        mkdir -p config
        cp /tmp/release-artifacts/blobs.yml config/ 2>/dev/null || true

        # Stage and commit the release artifacts
        git add config/blobs.yml
        git add .final_builds/
        git add releases/

        if git diff --staged --quiet; then
          echo "No changes to commit"
          sha=$(git rev-parse HEAD)
        else
          git commit -m "Finalize BOSH release"
        fi

        git push origin HEAD:${GITHUB_REF_NAME}

        sha=$(git rev-parse HEAD)

        echo "commit_sha=$sha" >> "$GITHUB_OUTPUT"

        # Cleanup
        rm -rf /tmp/release-artifacts

      popd
