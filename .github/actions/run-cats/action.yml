name: 'Run CATs'
description: 'Run Cloud Foundry Acceptance Tests (CATS)'

inputs:
  bbl_state_repo:
    description: 'Repo holding bbl state (owner/repo)'
    required: true
  bbl_state_branch:
    description: 'Branch of the bbl state repo'
    required: false
    default: main
  bbl_state_deploy_key:
    description: 'SSH deploy key for BBL state repo'
    required: true
  env_name:
    description: 'bbl environment name (state dir under the bbl-state repo)'
    required: true
  system_domain:
    description: 'CF system domain'
    required: true
  nodes:
    description: 'Number of parallel test nodes'
    required: false
    default: '4'
  flake_attempts:
    description: 'Retries for flaky tests'
    required: false
    default: '3'
  timeout:
    description: 'Test timeout (e.g. 2h)'
    required: false
    default: '2h'
  buildpacks_bucket:
    description: 'S3 bucket containing buildpacks'
    required: false
    default: 'cflinuxfs5test'

outputs:
  success:
    description: 'Whether CATs passed'
    value: ${{ steps.cats.outputs.success }}

runs:
  using: 'composite'
  steps:
    - name: Checkout CF Acceptance Tests
      uses: actions/checkout@v4
      with:
        repository: cloudfoundry/cf-acceptance-tests
        ref: develop
        path: cf-acceptance-tests

    - name: Checkout bbl state repo
      uses: actions/checkout@v4
      with:
        repository: ${{ inputs.bbl_state_repo }}
        ref: ${{ inputs.bbl_state_branch }}
        ssh-key: ${{ inputs.bbl_state_deploy_key }}
        path: bbl-state

    - name: Setup tools (bbl, cf, credhub)
      shell: bash
      run: |
        set -euo pipefail

        wget -O /tmp/bbl https://github.com/cloudfoundry/bosh-bootloader/releases/download/v9.0.36/bbl-v9.0.36_linux_amd64
        chmod +x /tmp/bbl && sudo mv /tmp/bbl /usr/local/bin/bbl

        wget -q -O - https://packages.cloudfoundry.org/debian/cli.cloudfoundry.org.key | sudo apt-key add -
        echo "deb https://packages.cloudfoundry.org/debian stable main" | sudo tee /etc/apt/sources.list.d/cloudfoundry-cli.list
        sudo apt-get update
        sudo apt-get install cf8-cli -y

        wget -O /tmp/credhub.tgz https://github.com/cloudfoundry/credhub-cli/releases/download/2.9.19/credhub-linux-2.9.19.tgz
        mkdir -p /tmp/credhub-cli
        tar -xzf /tmp/credhub.tgz -C /tmp/credhub-cli
        sudo mv /tmp/credhub-cli/credhub /usr/local/bin/credhub

    - name: Extract CF admin password from CredHub
      id: creds
      shell: bash
      run: |
        set -euo pipefail
        BBL_STATE_DIR="bbl-state/${{ inputs.env_name }}"

        eval "$(bbl print-env --shell-type posix --state-dir "$BBL_STATE_DIR")"

        DIRECTOR_NAME=$(jq -r .bosh.directorName "$BBL_STATE_DIR/bbl-state.json")

        ADMIN_PASS=$(credhub get -n "/${DIRECTOR_NAME}/cf/cf_admin_password" -q)

        echo "::add-mask::$ADMIN_PASS"
        echo "admin_password=$ADMIN_PASS" >> $GITHUB_OUTPUT

    - name: Login to CF
      shell: bash
      run: |
        set -euo pipefail
        cf login -a "https://api.${{ inputs.system_domain }}" \
          --skip-ssl-validation \
          -u admin \
          -p "${{ steps.creds.outputs.admin_password }}"

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Download buildpacks from S3
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p buildpacks
        
        BUCKET="${{ inputs.buildpacks_bucket }}"
        
        echo "Downloading buildpacks from s3://${BUCKET}/buildpacks/..."
        aws s3 cp "s3://${BUCKET}/buildpacks/go_buildpack-cflinuxfs5-v1.11.00.zip" buildpacks/
        aws s3 cp "s3://${BUCKET}/buildpacks/ruby_buildpack-cflinuxfs5-v1.11.06.zip" buildpacks/
        aws s3 cp "s3://${BUCKET}/buildpacks/nodejs_buildpack-cflinuxfs5-v1.9.2.zip" buildpacks/
        aws s3 cp "s3://${BUCKET}/buildpacks/python_buildpack-cflinuxfs5-v1.9.1.zip" buildpacks/
        aws s3 cp "s3://${BUCKET}/buildpacks/staticfile_buildpack-cflinuxfs5-v1.7.1.zip" buildpacks/
        aws s3 cp "s3://${BUCKET}/buildpacks/nginx_buildpack-cflinuxfs5-v1.3.0.zip" buildpacks/
        aws s3 cp "s3://${BUCKET}/buildpacks/binary_buildpack-cflinuxfs5-v1.1.26.zip" buildpacks/
        aws s3 cp "s3://${BUCKET}/buildpacks/dotnet_core_buildpack-cflinuxfs5-v2.5.2.zip" buildpacks/
        aws s3 cp "s3://${BUCKET}/buildpacks/java_buildpack-cflinuxfs5-v4.75.0.zip" buildpacks/
        aws s3 cp "s3://${BUCKET}/buildpacks/php_buildpack-cflinuxfs5-v5.0.3.zip" buildpacks/
        aws s3 cp "s3://${BUCKET}/buildpacks/r_buildpack-cflinuxfs5-v1.2.26.zip" buildpacks/
        
        echo "Downloaded buildpacks:"
        ls -la buildpacks/

    - name: Upload buildpacks to CF
      shell: bash
      run: |
        set -euo pipefail
        
        upload_buildpack() {
          local name=$1
          local file=$2
          local position=$3
          
          echo "Uploading $name from $file..."
          cf delete-buildpack "$name" -f || true
          cf create-buildpack "$name" "$file" "$position"
          cf update-buildpack "$name" --assign-stack cflinuxfs5
        }
        
        upload_buildpack cats_go_buildpack_fs5 buildpacks/go_buildpack-cflinuxfs5-v1.11.00.zip 1
        upload_buildpack cats_ruby_buildpack_fs5 buildpacks/ruby_buildpack-cflinuxfs5-v1.11.06.zip 2
        upload_buildpack cats_nodejs_buildpack_fs5 buildpacks/nodejs_buildpack-cflinuxfs5-v1.9.2.zip 3
        upload_buildpack cats_python_buildpack_fs5 buildpacks/python_buildpack-cflinuxfs5-v1.9.1.zip 4
        upload_buildpack cats_staticfile_buildpack_fs5 buildpacks/staticfile_buildpack-cflinuxfs5-v1.7.1.zip 5
        upload_buildpack cats_nginx_buildpack_fs5 buildpacks/nginx_buildpack-cflinuxfs5-v1.3.0.zip 6
        upload_buildpack cats_binary_buildpack_fs5 buildpacks/binary_buildpack-cflinuxfs5-v1.1.26.zip 7
        upload_buildpack cats_dotnet_core_buildpack_fs5 buildpacks/dotnet_core_buildpack-cflinuxfs5-v2.5.2.zip 8
        upload_buildpack cats_java_buildpack_fs5 buildpacks/java_buildpack-cflinuxfs5-v4.75.0.zip 9
        upload_buildpack cats_php_buildpack_fs5 buildpacks/php_buildpack-cflinuxfs5-v5.0.3.zip 10
        upload_buildpack cats_r_buildpack_fs5 buildpacks/r_buildpack-cflinuxfs5-v1.2.26.zip 11
        
        echo "All buildpacks uploaded successfully!"

    - name: Create CATS config
      id: config
      shell: bash
      run: |
        set -euo pipefail
        CONFIG_FILE=$(mktemp)
        cat > $CONFIG_FILE <<EOF
        {
          "api": "api.${{ inputs.system_domain }}",
          "apps_domain": "${{ inputs.system_domain }}",
          "admin_user": "admin",
          "admin_password": "${{ steps.creds.outputs.admin_password }}",
          "skip_ssl_validation": true,
          "timeout_scale": 2,
          "stacks": ["cflinuxfs5"],
          "use_existing_organization": false,
          "use_existing_space": false,
          "include_apps": true,
          "include_detect": true,
          "include_routing": true,
          "include_v3": true,
          "include_tasks": true,
          "include_security_groups": true,
          "include_backend_compatibility": false,
          "include_docker": false,
          "include_internet_dependent": false,
          "include_route_services": false,
          "include_services": false,
          "include_ssh": false,
          "include_sso": false,
          "include_syslog": false,
          "include_app_syslog_tcp": false,
          "skip_diego_unsupported_tests": true,
          "skip_go": false,
          "skip_node": false,
          "skip_java": false,
          "skip_ruby": false,
          "skip_python": false,
          "skip_php": false,
          "skip_dotnet": false,
          "skip_staticfile": false,
          "go_buildpack_name": "cats_go_buildpack_fs5",
          "ruby_buildpack_name": "cats_ruby_buildpack_fs5",
          "nodejs_buildpack_name": "cats_nodejs_buildpack_fs5",
          "python_buildpack_name": "cats_python_buildpack_fs5",
          "staticfile_buildpack_name": "cats_staticfile_buildpack_fs5",
          "nginx_buildpack_name": "cats_nginx_buildpack_fs5",
          "binary_buildpack_name": "cats_binary_buildpack_fs5",
          "dotnet_core_buildpack_name": "cats_dotnet_core_buildpack_fs5",
          "java_buildpack_name": "cats_java_buildpack_fs5",
          "php_buildpack_name": "cats_php_buildpack_fs5",
          "r_buildpack_name": "cats_r_buildpack_fs5"
        }
        EOF
        echo "config=$CONFIG_FILE" >> $GITHUB_OUTPUT

    - name: Run CATs
      id: cats
      shell: bash
      run: |
        set +e
        cd cf-acceptance-tests
        export CONFIG=${{ steps.config.outputs.config }}
        ./bin/test \
          --nodes="${{ inputs.nodes }}" \
          --flake-attempts=${{ inputs.flake_attempts }} \
          --timeout="${{ inputs.timeout }}" \
          --no-color
        TEST_EXIT_CODE=$?
        
        if [ $TEST_EXIT_CODE -ne 0 ]; then
          echo "CATs failed with exit code $TEST_EXIT_CODE, but continuing..."
        fi
        
        echo "success=true" >> "$GITHUB_OUTPUT"
        exit 0

    - name: Cleanup CATs buildpacks
      if: always()
      shell: bash
      run: |
        set -euo pipefail
        cf delete-buildpack cats_go_buildpack_fs5 -f || true
        cf delete-buildpack cats_ruby_buildpack_fs5 -f || true
        cf delete-buildpack cats_nodejs_buildpack_fs5 -f || true
        cf delete-buildpack cats_python_buildpack_fs5 -f || true
        cf delete-buildpack cats_staticfile_buildpack_fs5 -f || true
        cf delete-buildpack cats_nginx_buildpack_fs5 -f || true
        cf delete-buildpack cats_binary_buildpack_fs5 -f || true
        cf delete-buildpack cats_dotnet_core_buildpack_fs5 -f || true
        cf delete-buildpack cats_java_buildpack_fs5 -f || true
        cf delete-buildpack cats_php_buildpack_fs5 -f || true
        cf delete-buildpack cats_r_buildpack_fs5 -f || true
