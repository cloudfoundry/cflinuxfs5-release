name: 'Run CATs'
description: 'Run Cloud Foundry Acceptance Tests (CATS)'

inputs:
  bbl_state_repo:
    description: 'Repo holding bbl state (owner/repo)'
    required: true
  bbl_state_branch:
    description: 'Branch of the bbl state repo'
    required: false
    default: main
  bbl_state_deploy_key:
    description: 'SSH deploy key for BBL state repo'
    required: true
  env_name:
    description: 'bbl environment name (state dir under the bbl-state repo)'
    required: true
  system_domain:
    description: 'CF system domain'
    required: true
  stack:
    description: 'Stack to test (e.g., cflinuxfs5)'
    required: false
    default: 'cflinuxfs5'
  nodes:
    description: 'Number of parallel test nodes'
    required: false
    default: '4'
  flake_attempts:
    description: 'Retries for flaky tests'
    required: false
    default: '3'
  timeout:
    description: 'Test timeout (e.g. 2h)'
    required: false
    default: '2h'
  buildpacks_bucket:
    description: 'S3 bucket containing buildpacks'
    required: false
    default: 'cflinuxfs5-release'

outputs:
  success:
    description: 'Whether CATs passed'
    value: ${{ steps.cats.outputs.success }}

runs:
  using: 'composite'
  steps:
    - name: Checkout CF Acceptance Tests
      uses: actions/checkout@v4
      with:
        repository: cloudfoundry/cf-acceptance-tests
        ref: develop
        path: cf-acceptance-tests

    - name: Checkout bbl state repo
      uses: actions/checkout@v4
      with:
        repository: ${{ inputs.bbl_state_repo }}
        ref: ${{ inputs.bbl_state_branch }}
        ssh-key: ${{ inputs.bbl_state_deploy_key }}
        path: bbl-state

    - name: Setup tools (bbl, cf, credhub)
      shell: bash
      run: |
        set -euo pipefail

        wget -O /tmp/bbl https://github.com/cloudfoundry/bosh-bootloader/releases/download/v9.0.36/bbl-v9.0.36_linux_amd64
        chmod +x /tmp/bbl && sudo mv /tmp/bbl /usr/local/bin/bbl

        wget -q -O - https://packages.cloudfoundry.org/debian/cli.cloudfoundry.org.key | sudo apt-key add -
        echo "deb https://packages.cloudfoundry.org/debian stable main" | sudo tee /etc/apt/sources.list.d/cloudfoundry-cli.list
        sudo apt-get update
        sudo apt-get install cf8-cli -y

        wget -O /tmp/credhub.tgz https://github.com/cloudfoundry/credhub-cli/releases/download/2.9.19/credhub-linux-2.9.19.tgz
        mkdir -p /tmp/credhub-cli
        tar -xzf /tmp/credhub.tgz -C /tmp/credhub-cli
        sudo mv /tmp/credhub-cli/credhub /usr/local/bin/credhub

    - name: Extract CF admin password from CredHub
      id: creds
      shell: bash
      run: |
        set -euo pipefail
        BBL_STATE_DIR="bbl-state/${{ inputs.env_name }}"

        eval "$(bbl print-env --shell-type posix --state-dir "$BBL_STATE_DIR")"

        DIRECTOR_NAME=$(jq -r .bosh.directorName "$BBL_STATE_DIR/bbl-state.json")

        ADMIN_PASS=$(credhub get -n "/${DIRECTOR_NAME}/cf/cf_admin_password" -q)

        echo "::add-mask::$ADMIN_PASS"
        echo "admin_password=$ADMIN_PASS" >> $GITHUB_OUTPUT

    - name: Login to CF
      shell: bash
      run: |
        set -euo pipefail
        cf login -a "https://api.${{ inputs.system_domain }}" \
          --skip-ssl-validation \
          -u admin \
          -p "${{ steps.creds.outputs.admin_password }}"

    - name: Download buildpacks from S3
      id: buildpacks
      uses: ./.github/actions/download-buildpacks
      with:
        stack: ${{ inputs.stack }}
        bucket_name: ${{ inputs.buildpacks_bucket }}
        output_dir: buildpacks

    - name: Upload buildpacks to CF
      shell: bash
      run: |
        set -euo pipefail
        
        STACK="${{ inputs.stack }}"
        
        upload_buildpack() {
          local name=$1
          local file=$2
          local position=$3
          
          if [ -z "$file" ] || [ ! -f "$file" ]; then
            echo "WARNING: Buildpack file not found for $name, skipping..."
            return 0
          fi
          
          echo "Uploading $name from $file..."
          cf delete-buildpack "$name" -f || true
          cf create-buildpack "$name" "$file" "$position"
          cf update-buildpack "$name" --assign-stack "$STACK"
        }
        
        upload_buildpack "cats_go_buildpack_${STACK}" "${{ steps.buildpacks.outputs.go_buildpack }}" 1
        upload_buildpack "cats_ruby_buildpack_${STACK}" "${{ steps.buildpacks.outputs.ruby_buildpack }}" 2
        upload_buildpack "cats_nodejs_buildpack_${STACK}" "${{ steps.buildpacks.outputs.nodejs_buildpack }}" 3
        upload_buildpack "cats_python_buildpack_${STACK}" "${{ steps.buildpacks.outputs.python_buildpack }}" 4
        upload_buildpack "cats_staticfile_buildpack_${STACK}" "${{ steps.buildpacks.outputs.staticfile_buildpack }}" 5
        upload_buildpack "cats_nginx_buildpack_${STACK}" "${{ steps.buildpacks.outputs.nginx_buildpack }}" 6
        upload_buildpack "cats_binary_buildpack_${STACK}" "${{ steps.buildpacks.outputs.binary_buildpack }}" 7
        upload_buildpack "cats_dotnet_core_buildpack_${STACK}" "${{ steps.buildpacks.outputs.dotnet_core_buildpack }}" 8
        upload_buildpack "cats_java_buildpack_${STACK}" "${{ steps.buildpacks.outputs.java_buildpack }}" 9
        upload_buildpack "cats_php_buildpack_${STACK}" "${{ steps.buildpacks.outputs.php_buildpack }}" 10
        upload_buildpack "cats_r_buildpack_${STACK}" "${{ steps.buildpacks.outputs.r_buildpack }}" 11
        
        echo "All buildpacks uploaded successfully!"

    - name: Create CATS config
      id: config
      shell: bash
      run: |
        set -euo pipefail
        STACK="${{ inputs.stack }}"
        CONFIG_FILE=$(mktemp)
        cat > $CONFIG_FILE <<EOF
        {
          "api": "api.${{ inputs.system_domain }}",
          "apps_domain": "${{ inputs.system_domain }}",
          "admin_user": "admin",
          "admin_password": "${{ steps.creds.outputs.admin_password }}",
          "skip_ssl_validation": true,
          "timeout_scale": 2,
          "stacks": ["${STACK}"],
          "use_existing_organization": false,
          "use_existing_space": false,
          "include_apps": true,
          "include_detect": true,
          "include_routing": true,
          "include_v3": true,
          "include_tasks": true,
          "include_security_groups": true,
          "include_backend_compatibility": false,
          "include_docker": false,
          "include_internet_dependent": false,
          "include_route_services": false,
          "include_services": false,
          "include_ssh": false,
          "include_sso": false,
          "include_syslog": false,
          "include_app_syslog_tcp": false,
          "skip_diego_unsupported_tests": true,
          "skip_go": false,
          "skip_node": false,
          "skip_java": false,
          "skip_ruby": false,
          "skip_python": false,
          "skip_php": false,
          "skip_dotnet": false,
          "skip_staticfile": false,
          "go_buildpack_name": "cats_go_buildpack_${STACK}",
          "ruby_buildpack_name": "cats_ruby_buildpack_${STACK}",
          "nodejs_buildpack_name": "cats_nodejs_buildpack_${STACK}",
          "python_buildpack_name": "cats_python_buildpack_${STACK}",
          "staticfile_buildpack_name": "cats_staticfile_buildpack_${STACK}",
          "nginx_buildpack_name": "cats_nginx_buildpack_${STACK}",
          "binary_buildpack_name": "cats_binary_buildpack_${STACK}",
          "dotnet_core_buildpack_name": "cats_dotnet_core_buildpack_${STACK}",
          "java_buildpack_name": "cats_java_buildpack_${STACK}",
          "php_buildpack_name": "cats_php_buildpack_${STACK}",
          "r_buildpack_name": "cats_r_buildpack_${STACK}"
        }
        EOF
        echo "config=$CONFIG_FILE" >> $GITHUB_OUTPUT

    - name: Run CATs
      id: cats
      shell: bash
      run: |
        set +e
        cd cf-acceptance-tests
        export CONFIG=${{ steps.config.outputs.config }}
        ./bin/test \
          --nodes="${{ inputs.nodes }}" \
          --flake-attempts=${{ inputs.flake_attempts }} \
          --timeout="${{ inputs.timeout }}" \
          --no-color
        TEST_EXIT_CODE=$?
        
        if [ $TEST_EXIT_CODE -ne 0 ]; then
          echo "CATs failed with exit code $TEST_EXIT_CODE"
          echo "success=false" >> "$GITHUB_OUTPUT"
          exit $TEST_EXIT_CODE
        fi

        echo "success=true" >> "$GITHUB_OUTPUT"

    - name: Cleanup CATs buildpacks
      if: always()
      shell: bash
      run: |
        set -euo pipefail
        STACK="${{ inputs.stack }}"
        cf delete-buildpack "cats_go_buildpack_${STACK}" -f || true
        cf delete-buildpack "cats_ruby_buildpack_${STACK}" -f || true
        cf delete-buildpack "cats_nodejs_buildpack_${STACK}" -f || true
        cf delete-buildpack "cats_python_buildpack_${STACK}" -f || true
        cf delete-buildpack "cats_staticfile_buildpack_${STACK}" -f || true
        cf delete-buildpack "cats_nginx_buildpack_${STACK}" -f || true
        cf delete-buildpack "cats_binary_buildpack_${STACK}" -f || true
        cf delete-buildpack "cats_dotnet_core_buildpack_${STACK}" -f || true
        cf delete-buildpack "cats_java_buildpack_${STACK}" -f || true
        cf delete-buildpack "cats_php_buildpack_${STACK}" -f || true
        cf delete-buildpack "cats_r_buildpack_${STACK}" -f || true
