name: 'Build and Process Rootfs'
description: 'Complete rootfs build and processing pipeline'

inputs:
  stack:
    description: 'Stack name'
    required: true
  version:
    description: 'Version to build'
    required: true
  previous_version:
    description: 'Previous version for diff'
    required: false
  bucket_name:
    description: 'S3 bucket name'
    required: true
  release_repo:
    description: 'BOSH release repository'
    required: true
  cflinuxfs_repo:
    description: 'cflinuxfs repository (used for normal builds)'
    required: true
  cflinuxfs_fips_repo:
    description: 'cflinuxfs FIPS repository (used for FIPS builds)'
    required: false
    default: ''
  go_version:
    description: 'Go version'
    required: true
  cflinuxfs_pat:
    description: 'Personal Access Token for cflinuxfs repos (works for both normal and FIPS)'
    required: true
  release_deploy_key:
    description: 'SSH deploy key for release repo'
    required: true
  fips_mode:
    description: 'Build FIPS-compliant rootfs (normal or fips)'
    required: false
    default: 'normal'
  fips_method:
    description: 'FIPS build method (source or ubuntu-pro)'
    required: false
    default: 'source'
  aws_region:
    description: 'AWS region for S3 bucket'
    required: true

outputs:
  artifact_stack:
    description: 'Effective stack name for artifacts (e.g. cflinuxfs5 or cflinuxfs5-fips)'
    value: ${{ steps.make-rootfs.outputs.artifact_stack }}

runs:
  using: 'composite'
  steps:
    - name: Checkout self
      uses: actions/checkout@v4

    - name: Checkout buildpacks-ci
      uses: actions/checkout@v4
      with:
        repository: cloudfoundry/buildpacks-ci
        ref: master
        path: buildpacks-ci

    - name: Determine cflinuxfs repo to use
      id: determine-repo
      shell: bash
      run: |
        set -euo pipefail
        FIPS_MODE="${{ inputs.fips_mode }}"
        
        if [[ "$FIPS_MODE" == "fips" ]]; then
          # Use FIPS repo if provided, otherwise fall back to normal repo
          if [[ -n "${{ inputs.cflinuxfs_fips_repo }}" ]]; then
            echo "effective_repo=${{ inputs.cflinuxfs_fips_repo }}" >> $GITHUB_OUTPUT
            echo "Using FIPS repository: ${{ inputs.cflinuxfs_fips_repo }}"
          else
            echo "WARNING: FIPS mode requested but no FIPS repo configured, using normal repo"
            echo "effective_repo=${{ inputs.cflinuxfs_repo }}" >> $GITHUB_OUTPUT
          fi
        else
          echo "effective_repo=${{ inputs.cflinuxfs_repo }}" >> $GITHUB_OUTPUT
          echo "Using normal repository: ${{ inputs.cflinuxfs_repo }}"
        fi

    - name: Checkout cflinuxfs repo
      uses: actions/checkout@v4
      with:
        repository: ${{ steps.determine-repo.outputs.effective_repo }}
        ref: main
        path: ${{ inputs.stack }}
        token: ${{ inputs.cflinuxfs_pat }}

    - name: Make rootfs
      id: make-rootfs
      uses: ./.github/actions/make-rootfs
      with:
        stack: ${{ inputs.stack }}
        version: ${{ inputs.version }}
        privileged: true
        fips_mode: ${{ inputs.fips_mode }}
        fips_method: ${{ inputs.fips_method }}

    - name: Generate receipt diff
      uses: ./.github/actions/generate-receipt-diff
      with:
        stack: ${{ steps.make-rootfs.outputs.artifact_stack }}
        version: ${{ inputs.version }}
        previous_version: ${{ inputs.previous_version }}
        bucket_name: ${{ inputs.bucket_name }}

    - name: Build cflinuxfs BOSH release
      uses: ./.github/actions/create-bosh-release
      with:
        stack: ${{ inputs.stack }}
        artifact_stack: ${{ steps.make-rootfs.outputs.artifact_stack }}
        version: ${{ inputs.version }}
        bucket_name: ${{ inputs.bucket_name }}
        release_name: ${{ inputs.stack }}
        release_repo: ${{ inputs.release_repo }}
        release_deploy_key: ${{ inputs.release_deploy_key }}
        go_version: ${{ inputs.go_version }}
        aws_region: ${{ inputs.aws_region }}
        final: false

    - name: Upload stack to S3
      uses: ./.github/actions/upload-s3
      with:
        upload_type: stack
        stack: ${{ steps.make-rootfs.outputs.artifact_stack }}
        version: ${{ inputs.version }}
        bucket_name: ${{ inputs.bucket_name }}
        aws_region: ${{ inputs.aws_region }}

    - name: Upload receipt to S3
      uses: ./.github/actions/upload-s3
      with:
        upload_type: receipt
        stack: ${{ steps.make-rootfs.outputs.artifact_stack }}
        version: ${{ inputs.version }}
        bucket_name: ${{ inputs.bucket_name }}
        aws_region: ${{ inputs.aws_region }}

    - name: Upload BOSH release to S3
      uses: ./.github/actions/upload-s3
      with:
        upload_type: release
        stack: ${{ steps.make-rootfs.outputs.artifact_stack }}
        version: ${{ inputs.version }}
        bucket_name: ${{ inputs.bucket_name }}
        aws_region: ${{ inputs.aws_region }}
        file: rootfs-artifacts/${{ steps.make-rootfs.outputs.artifact_stack }}-release-${{ inputs.version }}.tgz

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: rootfs-build-${{ inputs.version }}
        path: |
          rootfs-artifacts/
          receipt-artifacts/
          public-robots-artifacts/
        retention-days: 30
